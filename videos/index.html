    <style>
        :root {
            --vermell-foc: #9B1B30;
            --vermell-intens: #B22340;
            --vermell-brillant: #C92A4A;
            --negre-nit: #0A0A0A;
            --negre-dimoni: #141414;
            --negre-suau: #1F1F1F;
            --blanc-camisa: #F5F5F5;
            --gris-fum: #808080;
            
            --bg-primary: var(--negre-nit);
            --bg-secondary: var(--negre-dimoni);
            --bg-tertiary: var(--negre-suau);
            --text-primary: var(--blanc-camisa);
            --text-secondary: var(--gris-fum);
            
            /* Hover variables - default for touch devices */
            --hover-underline: 0;
            --header-gradient: linear-gradient(to bottom, var(--negre-nit) 0%, transparent 100%);

            /* Page-wide horizontal padding — single source of truth */
            --page-pad: 3rem;
        }

        @media (max-width: 768px) {
            :root { --page-pad: 1.5rem; }
        }

        [data-theme="light"] {
            --bg-primary: #F8F5F2;
            --bg-secondary: var(--blanc-camisa);
            --bg-tertiary: #EDE8E3;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --header-gradient: linear-gradient(to bottom, #F8F5F2 0%, transparent 100%);
            --header-bg: rgba(255,255,255,0.98);
            --header-border: rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 85vh;
            display: flex;
            align-items: flex-end;
            padding: 0 var(--page-pad) 4rem;
            background: linear-gradient(
                to right,
                var(--bg-primary) 0%,
                transparent 50%
            ),
            linear-gradient(
                to top,
                var(--bg-primary) 0%,
                transparent 60%
            ),
            url('https://www.casafari.com/wp-content/uploads/2018/03/sant-antoni-fiesta-arta-mallorca.jpg') center/cover;
            transition: background 0.3s ease;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 80%, rgba(198, 30, 30, 0.15) 0%, transparent 50%),
                linear-gradient(to bottom, transparent 60%, var(--bg-primary) 100%);
            transition: background 0.3s ease;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--vermell-foc);
            padding: 0.4rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.25rem;
        }

        .hero-title {
            font-family: var(--font-heading);
            font-size: 4.5rem;
            line-height: 0.95;
            letter-spacing: 0.02em;
            margin-bottom: 1.25rem;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.8);
        }

        [data-theme="light"] .hero-title {
            text-shadow: 1px 1px 8px rgba(0,0,0,0.3);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hero-meta .year {
            color: var(--vermell-brillant);
            font-weight: 700;
        }

        .hero-meta .creator,
        .hero-meta .duration {
            color: var(--text-secondary);
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-play {
            background: var(--blanc-camisa);
            color: var(--negre-nit);
        }

        .btn-play:hover {
            background: var(--blanc-camisa);
            transform: scale(1.02);
        }

        [data-theme="light"] .btn-play {
            background: var(--negre-nit);
            color: var(--blanc-camisa);
        }

        [data-theme="light"] .btn-play:hover {
            background: #2a2a2a;
        }

        .btn-info {
            background: rgba(255,255,255,0.15);
            color: var(--blanc-camisa);
            backdrop-filter: blur(4px);
        }

        .btn-info:hover {
            background: rgba(255,255,255,0.25);
        }

        [data-theme="light"] .btn-info {
            background: rgba(20,20,20,0.85);
            color: var(--blanc-camisa);
        }

        [data-theme="light"] .btn-info:hover {
            background: rgba(20,20,20,0.95);
        }

        /* Content Rows */
        .content-section {
            position: relative;
            z-index: 10;
            padding: 0;
        }

        .row {
            margin-bottom: 1.5rem;
            overflow: hidden;
            position: relative;
        }

        .row-featured {
            background:
                radial-gradient(ellipse at 50% 0%, rgba(155, 27, 48, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse at 100% 100%, rgba(155, 27, 48, 0.5) 0%, transparent 70%),
                linear-gradient(180deg, rgba(155, 27, 48, 0.22) 0%, rgba(155, 27, 48, 0.1) 100%);
            padding: 2rem 0 2.25rem;
            border-top: 1px solid rgba(155, 27, 48, 0.55);
            border-bottom: 1px solid rgba(155, 27, 48, 0.55);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 8px 32px rgba(0, 0, 0, 0.45);
        }

        [data-theme="light"] .row-featured {
            background:
                radial-gradient(ellipse at 50% 0%, rgba(155, 27, 48, 0.4) 0%, transparent 75%),
                radial-gradient(ellipse at 100% 100%, rgba(155, 27, 48, 0.6) 0%, transparent 75%),
                linear-gradient(180deg, rgba(155, 27, 48, 0.3) 0%, rgba(155, 27, 48, 0.18) 100%);
            border-top: 1px solid rgba(155, 27, 48, 0.65);
            border-bottom: 1px solid rgba(155, 27, 48, 0.65);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                0 8px 32px rgba(155, 27, 48, 0.25);
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            color: var(--blanc-camisa);
            cursor: pointer;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, background 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .carousel-nav.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .carousel-nav:hover {
            background: var(--blanc-camisa);
            color: var(--negre-nit);
        }

        .carousel-nav svg {
            width: 24px;
            height: 24px;
        }

        .carousel-nav-left {
            left: 0.5rem;
        }

        .carousel-nav-right {
            right: 0.5rem;
        }

        [data-theme="light"] .carousel-nav {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        [data-theme="light"] .carousel-nav:hover {
            background: var(--blanc-camisa);
            color: var(--negre-nit);
        }

        @media (max-width: 768px) {
            .carousel-nav {
                display: none;
            }
        }

        .row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--page-pad);
            margin-bottom: 1rem;
        }

        .row-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .row-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 1.5rem;
            background: var(--vermell-foc);
        }

        .row-title .punt-volat {
            display: inline-block;
            margin: 0 -0.4em;
            letter-spacing: 0;
            font-size: 0.85em;
            transform: translateY(0.05em);
        }

        .row-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .cards-container {
            display: flex;
            gap: 1rem;
            padding: 1.25rem var(--page-pad);
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .cards-container::-webkit-scrollbar {
            display: none;
        }

        /* Clips filter */
        .filter-wrap {
            position: relative;
        }
        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.08);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.45rem 0.85rem;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        [data-theme="light"] .filter-btn {
            border-color: rgba(0,0,0,0.1);
        }
        .filter-btn:hover {
            border-color: var(--vermell-foc);
            color: var(--vermell-foc);
        }
        .filter-btn[aria-expanded="true"] {
            border-color: var(--vermell-foc);
            color: var(--vermell-foc);
        }
        .filter-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
        .filter-btn .chev {
            transition: transform 0.2s ease;
        }
        .filter-btn[aria-expanded="true"] .chev {
            transform: rotate(180deg);
        }
        .filter-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            min-width: 180px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 0.35rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            z-index: 50;
            display: none;
        }
        [data-theme="light"] .filter-menu {
            border-color: rgba(0,0,0,0.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .filter-menu.open {
            display: block;
        }
        .filter-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.55rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .filter-option:hover {
            background: var(--bg-tertiary);
        }
        .filter-option.active {
            color: var(--vermell-foc);
        }
        .filter-option .count {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Clips Grid (no carousel) */
        .clips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem 1rem;
            padding: 0.5rem var(--page-pad);
            overflow-x: visible;
        }

        .clips-grid .video-card {
            flex-shrink: 0;
            width: calc(25% - 0.75rem);
            min-width: 200px;
            opacity: 0.85;
        }

        .clips-grid .card-info {
            flex-direction: column;
            align-items: flex-start;
        }

        /* Clip card: cover image with text below */
        .video-card.clip-card {
            aspect-ratio: auto;
            background: transparent;
            overflow: visible;
            border-radius: 0;
            transition: opacity 0.2s ease;
        }
        .clips-grid:hover .video-card.clip-card {
            opacity: 0.65;
        }
        .clips-grid .video-card.clip-card:hover {
            opacity: 1;
        }
        .video-card.clip-card::after { display: none; }
        .video-card.clip-card .card-cover {
            position: relative;
            aspect-ratio: 16/9;
            border-radius: 4px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }
        .video-card.clip-card .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-card.clip-card .card-info-below {
            padding: 0.5rem 0.15rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .video-card.clip-card .card-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.3;
        }
        .video-card.clip-card .card-year {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-shadow: none;
            letter-spacing: 0.04em;
            line-height: 1;
        }
        .video-card.clip-card:hover {
            transform: none;
            box-shadow: none;
        }
        .video-card.clip-card:hover .card-cover {
            box-shadow: 0 0 0 2px var(--vermell-foc), 0 8px 20px rgba(0,0,0,0.45);
        }

        @media (max-width: 1200px) {
            .clips-grid .video-card {
                width: calc(33.333% - 0.67rem);
            }
        }

        @media (max-width: 900px) {
            .clips-grid .video-card {
                width: calc(50% - 0.5rem);
            }
        }

        @media (max-width: 600px) {
            .clips-grid {
                gap: 1.5rem 0.75rem;
            }
            .clips-grid .video-card {
                width: calc(50% - 0.375rem);
                min-width: 0;
            }
        }

        /* Skeleton Loading */
        .skeleton-card {
            flex-shrink: 0;
            width: 300px;
            aspect-ratio: 16/9;
            border-radius: 4px;
            background: var(--bg-tertiary);
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.08) 50%,
                transparent 100%
            );
            animation: skeleton-shimmer 1.5s infinite;
        }

        [data-theme="light"] .skeleton-card::after {
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(0,0,0,0.06) 50%,
                transparent 100%
            );
        }

        @keyframes skeleton-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .clips-grid .skeleton-card {
            width: calc(25% - 0.75rem);
            min-width: 200px;
        }

        @media (max-width: 1200px) {
            .clips-grid .skeleton-card {
                width: calc(33.333% - 0.67rem);
            }
        }

        @media (max-width: 900px) {
            .clips-grid .skeleton-card {
                width: calc(50% - 0.5rem);
            }
        }

        @media (max-width: 600px) {
            .clips-grid .skeleton-card {
                width: calc(50% - 0.375rem);
                min-width: 0;
            }
        }

        /* Video Cards */
        .video-card {
            flex-shrink: 0;
            width: 300px;
            aspect-ratio: 16/9;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-tertiary);
        }

        .video-card:hover {
            transform: scale(1.08);
            z-index: 100;
            box-shadow:
                0 0 0 2px var(--vermell-foc),
                0 20px 40px rgba(0,0,0,0.6);
        }

        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .video-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.95) 0%,
                rgba(0,0,0,0.4) 40%,
                transparent 70%
            );
            opacity: 1;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-card:hover::after {
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.98) 0%,
                rgba(0,0,0,0.6) 50%,
                transparent 80%
            );
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .video-card:hover .card-info {
            transform: translateY(0);
        }

        .card-year {
            font-family: var(--font-body);
            font-size: 2.2rem;
            color: var(--blanc-camisa);
            text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7);
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .card-year-top {
            position: absolute;
            top: 0;
            left: 0.6rem;
            z-index: 2;
            font-family: var(--font-body);
            font-size: 4rem;
            font-weight: 700;
            color: var(--blanc-camisa);
            text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.8);
            letter-spacing: 0.04em;
            line-height: 1;
            text-align: left;
            white-space: nowrap;
        }

        .card-year-top--range {
            font-size: 3.4rem;
        }


        @media (max-width: 600px) {
            .card-year-top {
                font-size: 2.6rem;
            }
            .card-year-top--range {
                font-size: 2.2rem;
            }
            .card-creator {
                font-size: 0.72rem;
            }
            .card-duration {
                font-size: 0.72rem;
            }
        }

        .card-creator {
            font-size: 0.85rem;
            color: var(--blanc-camisa);
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            margin-top: 0.25rem;
            letter-spacing: 0.02em;
            opacity: 0.9;
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--blanc-camisa);
            margin-bottom: 0.3rem;
        }

        .card-duration {
            font-size: 0.85rem;
            color: var(--blanc-camisa);
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            font-weight: 600;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            width: 48px;
            height: 48px;
            background: var(--vermell-foc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.2);
            opacity: 0.9;
        }

        .play-icon::after {
            content: '';
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent var(--blanc-camisa);
            margin-left: 3px;
        }

        .video-card:hover .play-icon {

                    <span class="modal-title-year"></span>
                </div>
                <a class="video-modal-credit" id="videoModalCredit" target="_blank" rel="noopener" style="display:none">
                    <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
                        <path fill="#FF0000" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8z"/>
                        <path fill="#F5F5F5" d="M9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/>
                    </svg>
                    <span class="credit-year"></span>
                    <span class="credit-name"></span>
                </a>
                <button class="video-modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="video-modal-content">
                <media-player id="videoPlayer" crossorigin playsinline>
                    <media-provider></media-provider>
                    <media-video-layout thumbnails="" no-title></media-video-layout>
                </media-player>
                <div class="play-pause-feedback" id="playPauseFeedback">
                    <svg class="feedback-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="feedback-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
            </div>
            <section class="episodes-panel" id="episodesPanel" aria-label="Parts del vídeo">
                <div class="episodes-track" id="episodesTrack"></div>
            </section>
            <section class="recommendations-panel" id="recommendationsPanel" aria-label="Més clips">
                <div class="episodes-track" id="recommendationsTrack"></div>
            </section>
        </div>
    </div>

    <script type="module">
        // Vidstack Player Setup
        let player = null;
        let firstPlay = true;

        // Mobile YouTube IFrame Player API state. We drive playback ourselves
        // (one video at a time, listening for ENDED) instead of relying on
        // YT's `playlist=` URL param — that way the title chip and active
        // recommendation card stay in sync when the next clip auto-starts.
        let ytApiReady = false;
        let ytPlayer = null;
        let ytPlayerReady = false;
        let pendingMobilePlay = null;

        (function loadYouTubeIframeApi() {
            if (window.YT && window.YT.Player) { ytApiReady = true; return; }
            if (document.querySelector('script[data-yt-iframe-api]')) return;
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            tag.setAttribute('data-yt-iframe-api', '');
            document.head.appendChild(tag);
        })();

        window.onYouTubeIframeAPIReady = function() {
            ytApiReady = true;
            if (pendingMobilePlay) {
                const fn = pendingMobilePlay;
                pendingMobilePlay = null;
                fn();
            }
        };

        // Multi-part state (pelicula mode)
        let currentParts = [];
        let currentPartIdx = 0;
        let currentCoverScale = 1;

        // Clip queue state (clip autoplay/recommendations)
        let modalMode = 'pelicula'; // 'pelicula' | 'clip'
        let clipQueue = [];
        let clipQueueIdx = 0;

        // Clips filter state
        let allClips = [];
        let clipsFilter = 'all'; // 'all' | decade start year as string, e.g. '2020'

        // Pelicules cache (populated from data.json) — used by the share-link deep-link resolver
        let allPelicules = [];

        // Sync `?peli=<videoId>` or `?clip=<videoId>` so the current player state is shareable.
        // Two distinct params disambiguate the case where the same YouTube id appears
        // in both a pelicula and a clip (e.g. -b6B9HO7984 is part 3 of the 1981 pel·lícula
        // AND part 2 of the "Entrevista a Don Toni Gili" clip).
        // Uses replaceState so auto-advance and part changes don't spam history.
        const SHARE_PARAMS = ['peli', 'clip'];
        function setShareUrl(videoId, kind) {
            if (!videoId) return;
            const url = new URL(window.location.href);
            const keep = kind === 'clip' ? 'clip' : 'peli';
            const drop = keep === 'clip' ? 'peli' : 'clip';
            let changed = false;
            if (url.searchParams.has(drop)) { url.searchParams.delete(drop); changed = true; }
            if (url.searchParams.get(keep) !== videoId) {
                url.searchParams.set(keep, videoId);
                changed = true;
            }
            if (!changed) return;
            history.replaceState(null, '', url.pathname + (url.search ? url.search : '') + url.hash);
        }
        function clearShareUrl() {
            const url = new URL(window.location.href);
            let changed = false;
            for (const p of SHARE_PARAMS) {
                if (url.searchParams.has(p)) { url.searchParams.delete(p); changed = true; }
            }
            if (!changed) return;
            history.replaceState(null, '', url.pathname + (url.search ? url.search : '') + url.hash);
        }

        // Creator → channel URL map (populated from data.json)
        let creatorsMap = {};

        // Mobile detection — pointer:coarse = touch/mobile
        const isMobile = () => window.matchMedia('(pointer: coarse)').matches;

        // Wait for Vidstack to be ready
        customElements.whenDefined('media-player').then(() => {
            player = document.getElementById('videoPlayer');

            // YouTube-style play/pause feedback
            const feedback = document.getElementById('playPauseFeedback');
            const feedbackPlay = feedback.querySelector('.feedback-play');
            const feedbackPause = feedback.querySelector('.feedback-pause');

            player.addEventListener('play', () => {
                if (firstPlay) { firstPlay = false; return; }
                feedbackPlay.style.display = '';
                feedbackPause.style.display = 'none';
                showFeedback();
            });

            player.addEventListener('pause', () => {
                feedbackPlay.style.display = 'none';
                feedbackPause.style.display = '';
                showFeedback();
            });

            // Auto-advance to next part / clip when current ends.
            player.addEventListener('ended', handleVideoEnded);

            function showFeedback() {
                feedback.classList.remove('animate');
                void feedback.offsetWidth; // force reflow
                feedback.classList.add('animate');
            }
        });

        // Episodes panel refs
        const episodesPanel = document.getElementById('episodesPanel');
        const episodesTrack = document.getElementById('episodesTrack');
        const recommendationsPanel = document.getElementById('recommendationsPanel');
        const recommendationsTrack = document.getElementById('recommendationsTrack');
        const videoModal = document.getElementById('videoModal');

        // Shared between Vidstack's `ended` event (desktop) and the YouTube
        // IFrame API's onStateChange ENDED (mobile). Re-running playCurrentVideo
        // for the next item is what keeps the title chip, active recommendation
        // card, and share URL in sync as auto-advance progresses.
        // Guard: only advance if the modal is actually open and we have a queue,
        // otherwise a late/stale `ended` event from a torn-down video would
        // mutate clipQueueIdx and desync the header from the playing video.
        function handleVideoEnded() {
            const modalOpen = document.getElementById('videoModal').classList.contains('active');
            if (!modalOpen) return;
            if (modalMode === 'clip') {
                if (clipQueue.length === 0) return;
                if (currentPartIdx < currentParts.length - 1) {
                    currentPartIdx++;
                    updateRecommendationsUI();
                    playCurrentVideo();
                } else if (clipQueueIdx < clipQueue.length - 1) {
                    clipQueueIdx++;
                    const nextClip = clipQueue[clipQueueIdx];
                    currentCoverScale = nextClip.coverScale || 1;
                    currentParts = clipParts(nextClip);
                    currentPartIdx = 0;
                    updateRecommendationsUI();
                    playCurrentVideo();
                }
            } else if (currentPartIdx < currentParts.length - 1) {
                currentPartIdx++;
                updatePartUI();
                playCurrentVideo();
            }
        }

        function updatePartUI() {
            // In clip mode, parts are rendered inside the unified recommendations track.
            if (modalMode === 'clip') {
                episodesPanel.classList.remove('visible');
                episodesTrack.innerHTML = '';
                return;
            }
            if (currentParts.length <= 1) {
                episodesPanel.classList.remove('visible');
                episodesTrack.innerHTML = '';
                return;
            }

            episodesPanel.classList.add('visible');

            episodesTrack.innerHTML = '';
            currentParts.forEach((part, idx) => {
                const id = partId(part);
                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'episode-card' + (idx === currentPartIdx ? ' active' : '');
                const thumbStyle = currentCoverScale && currentCoverScale !== 1 ? ` style="transform: scale(${currentCoverScale})"` : '';
                card.innerHTML = `
                    <div class="episode-thumb">
                        <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="Part ${idx + 1}" loading="lazy"${thumbStyle}>
                        <div class="episode-thumb-overlay">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="episode-meta">
                        <span class="episode-label">Part ${idx + 1}</span>
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (idx === currentPartIdx) return;
                    currentPartIdx = idx;
                    updatePartUI();
                    playCurrentVideo();
                    scrollActiveIntoView();
                });
                episodesTrack.appendChild(card);
            });

            scrollActiveIntoView();
        }

        function scrollActiveIntoView() {
            const active = episodesTrack.querySelector('.episode-card.active');
            if (active) {
                active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }

        function partId(p) {
            return (p && typeof p === 'object') ? p.id : p;
        }

        function partStart(p) {
            return (p && typeof p === 'object' && typeof p.start === 'number') ? p.start : 0;
        }

        function clipParts(clip) {
            if (!clip) return [];
            if (Array.isArray(clip.videoId)) return clip.videoId;
            if (typeof clip.start === 'number') return [{ id: clip.videoId, start: clip.start }];
            return [clip.videoId];
        }

        function currentVideoId() {
            return partId(currentParts[currentPartIdx]);
        }

        function currentVideoStart() {
            return partStart(currentParts[currentPartIdx]);
        }

        function updateClipHeader() {
            const titleEl = document.getElementById('videoModalTitle');
            if (modalMode === 'clip' && clipQueue[clipQueueIdx]) {
                const clip = clipQueue[clipQueueIdx];
                titleEl.querySelector('.modal-title-text').textContent = clip.title || '';
                titleEl.querySelector('.modal-title-year').textContent = clip.year != null ? clip.year : '';
                titleEl.style.display = '';
            } else {
                titleEl.style.display = 'none';
            }
        }

        function playCurrentVideo() {
            updateClipHeader();
            const modal = document.getElementById('videoModal');
            const content = modal.querySelector('.video-modal-content');
            const videoId = currentVideoId();
            const startAt = currentVideoStart();
            setShareUrl(videoId, modalMode === 'clip' ? 'clip' : 'peli');

            if (isMobile()) {
                // Mobile: drive playback through the YouTube IFrame Player API so
                // we get an ENDED state-change we can hook into (and so loading
                // the next clip ourselves updates the title chip / active card).
                content.querySelector('media-player').style.display = 'none';

                const playMobile = () => {
                    if (!ytPlayer) {
                        let host = content.querySelector('.yt-mobile-host');
                        if (!host) {
                            host = document.createElement('div');
                            host.className = 'yt-mobile-host';
                            content.appendChild(host);
                        }
                        ytPlayer = new YT.Player(host, {
                            videoId: videoId,
                            playerVars: {
                                autoplay: 1,
                                playsinline: 1,
                                rel: 0,
                                modestbranding: 1,
                                start: startAt > 0 ? startAt : 0,
                            },
                            events: {
                                onReady: () => {
                                    ytPlayerReady = true;
                                    try {
                                        const ifr = ytPlayer.getIframe();
                                        ifr.classList.add('yt-mobile-iframe');
                                        ifr.style.display = 'block';
                                    } catch (_) {}
                                },
                                onStateChange: (e) => {
                                    if (e.data === YT.PlayerState.ENDED) handleVideoEnded();
                                },
                            },
                        });
                        // Apply our class synchronously too so the iframe isn't
                        // briefly visible at the default 640×360 before onReady.
                        try {
                            const ifr = ytPlayer.getIframe();
                            if (ifr) {
                                ifr.classList.add('yt-mobile-iframe');
                                ifr.style.display = 'block';
                            }
                        } catch (_) {}
                    } else {
                        try {
                            ytPlayer.loadVideoById({ videoId: videoId, startSeconds: startAt > 0 ? startAt : 0 });
                        } catch (_) {}
                        try {
                            const ifr = ytPlayer.getIframe();
                            if (ifr) ifr.style.display = 'block';
                        } catch (_) {}
                    }
                };

                if (ytApiReady) playMobile();
                else pendingMobilePlay = playMobile;
            } else {
                // Desktop: Vidstack
                if (ytPlayer) {
                    try { ytPlayer.stopVideo(); } catch (_) {}
                    try {
                        const ifr = ytPlayer.getIframe();
                        if (ifr) ifr.style.display = 'none';
                    } catch (_) {}
                }
                content.querySelector('media-player').style.display = '';

                if (player) {
                    firstPlay = true;
                    const onCanPlay = () => {
                        if (startAt > 0) {
                            try { player.currentTime = startAt; } catch (_) {}
                        }
                        player.play();
                        player.removeEventListener('can-play', onCanPlay);
                    };
                    player.addEventListener('can-play', onCanPlay);
                    player.src = `youtube/${videoId}`;
                }
            }
        }

        function updateRecommendationsUI() {
            if (modalMode !== 'clip' || clipQueue.length === 0) {
                recommendationsPanel.classList.remove('visible');
                recommendationsTrack.innerHTML = '';
                return;
            }

            recommendationsPanel.classList.add('visible');
            recommendationsTrack.innerHTML = '';

            // Parts of the current clip come first when the clip is multipart.
            if (currentParts.length > 1) {
                currentParts.forEach((part, idx) => {
                    const id = partId(part);
                    const card = document.createElement('button');
                    card.type = 'button';
                    card.className = 'episode-card' + (idx === currentPartIdx ? ' active' : '');
                    const thumbStyle = currentCoverScale && currentCoverScale !== 1 ? ` style="transform: scale(${currentCoverScale})"` : '';
                    card.innerHTML = `
                        <div class="episode-thumb">
                            <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="Part ${idx + 1}" loading="lazy"${thumbStyle}>
                            <div class="episode-thumb-overlay">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        <div class="episode-meta">
                            <span class="episode-label">Part ${idx + 1}</span>
                        </div>
                    `;
                    card.addEventListener('click', () => {
                        if (idx === currentPartIdx) return;
                        currentPartIdx = idx;
                        updateRecommendationsUI();
                        playCurrentVideo();
                    });
                    recommendationsTrack.appendChild(card);
                });
            }

            // The "Més clips" header (small bar + label) is rendered as
            // pseudo-elements on the first clip card, so it floats above
            // it without claiming a slot in the row.
            clipQueue.forEach((clip, idx) => {
                const card = document.createElement('button');
                card.type = 'button';
                const isFirstRec = idx === 0;
                card.className = 'episode-card rec-clip'
                    + (idx === clipQueueIdx ? ' active' : '')
                    + (isFirstRec ? ' first-rec' : '');
                const thumbStyle = clip.coverScale && clip.coverScale !== 1 ? ` style="transform: scale(${clip.coverScale})"` : '';
                const recThumbId = partId(clipParts(clip)[0]);
                card.innerHTML = `
                    <div class="episode-thumb">
                        <img src="https://img.youtube.com/vi/${recThumbId}/hqdefault.jpg" alt="${clip.title}" loading="lazy"${thumbStyle}>
                        <div class="episode-thumb-overlay">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="episode-meta">
                        <span class="episode-label">${clip.title}</span>
                        <span class="episode-sublabel">${clip.year}</span>
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (idx === clipQueueIdx) return;
                    clipQueueIdx = idx;
                    currentCoverScale = clip.coverScale || 1;
                    currentParts = clipParts(clip);
                    currentPartIdx = 0;
                    updatePartUI();
                    updateRecommendationsUI();
                    playCurrentVideo();
                    scrollActiveRecommendationIntoView();
                });
                recommendationsTrack.appendChild(card);
            });

            scrollActiveRecommendationIntoView();
        }

        function scrollActiveRecommendationIntoView() {
            const active = recommendationsTrack.querySelector('.episode-card.active');
            if (active) {
                active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }

        // Video Modal Functions
        window.openVideo = function(videoId, creator, year, coverScale) {
            modalMode = 'pelicula';
            currentParts = Array.isArray(videoId) ? videoId.slice() : [videoId];
            currentPartIdx = 0;
            currentCoverScale = coverScale || 1;
            clipQueue = [];
            clipQueueIdx = 0;

            const modal = document.getElementById('videoModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            const credit = document.getElementById('videoModalCredit');
            if (creator) {
                const url = (creatorsMap && creatorsMap[creator]) || `https://www.youtube.com/results?search_query=${encodeURIComponent(creator)}`;
                credit.href = url;
                credit.querySelector('.credit-year').textContent = year != null ? year : '';
                credit.querySelector('.credit-name').textContent = creator;
                credit.style.display = '';
            } else {
                credit.style.display = 'none';
            }

            updatePartUI();
            updateRecommendationsUI();
            playCurrentVideo();
        }

        window.openClip = function(queue, idx) {
            // Tear down any in-flight playback first so a stale `ended` event
            // from the previous video cannot mutate clipQueueIdx after we've set it.
            if (player) {
                try { player.pause(); } catch (_) {}
                try { player.src = ''; } catch (_) {}
            }
            if (ytPlayer) {
                try { ytPlayer.stopVideo(); } catch (_) {}
            }

            modalMode = 'clip';
            clipQueue = queue.slice();
            clipQueueIdx = idx;
            currentCoverScale = clipQueue[idx].coverScale || 1;
            currentParts = clipParts(clipQueue[idx]);
            currentPartIdx = 0;

            const modal = document.getElementById('videoModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            document.getElementById('videoModalCredit').style.display = 'none';

            updateClipHeader();
            updatePartUI();
            updateRecommendationsUI();
            playCurrentVideo();
        }

        window.closeModal = function(event) {
            if (event && event.target !== event.currentTarget) return;
            const modal = document.getElementById('videoModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            clearShareUrl();

            // Reset episodes panel
            episodesPanel.classList.remove('visible');
            episodesTrack.innerHTML = '';

            // Reset recommendations panel
            recommendationsPanel.classList.remove('visible');
            recommendationsTrack.innerHTML = '';

            // Reset clip title chip
            document.getElementById('videoModalTitle').style.display = 'none';

            // Stop mobile YouTube player and drop any deferred first-time play
            if (ytPlayer) {
                try { ytPlayer.stopVideo(); } catch (_) {}
            }
            pendingMobilePlay = null;

            // Stop Vidstack
            if (player) {
                player.pause();
                setTimeout(() => { player.src = ''; }, 500);
            }

            // Reset queue state so no stale index can leak into the next session.
            modalMode = 'pelicula';
            clipQueue = [];
            clipQueueIdx = 0;
            currentParts = [];
            currentPartIdx = 0;
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.closeModal();
        });

        // Cmd+Shift (or Ctrl+Shift) on the creator credit → open current video on YouTube instead of the channel
        document.getElementById('videoModalCredit').addEventListener('click', (e) => {
            if (e.shiftKey && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                const videoId = currentVideoId();
                if (videoId) window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank', 'noopener');
            }
        });


        // Build inline style for a card cover image based on optional coverScale.
        // coverScale: number (e.g. 1.18) zooms the image so letterbox bars get cropped out.
        function buildCoverStyle(item) {
            if (!item.coverScale || item.coverScale === 1) return '';
            return ` style="transform: scale(${item.coverScale})"`;
        }

        // Carregar dades dinàmicament
        async function loadData() {
            try {
                const response = await fetch('/data.json');
                const data = await response.json();
                
                // Creator channel URLs
                creatorsMap = data.creators || {};

                // Cache pelicules for the share-link resolver
                allPelicules = data.pelicules || [];

                // Actualitzar Hero
                const featured = data.featured;
                document.querySelector('.hero-title').textContent = featured.title;
                document.querySelector('.hero-subtitle').textContent = featured.subtitle;
                const featuredPeli = data.pelicules.find(p => p.year === featured.year);
                document.querySelector('.hero-meta .duration').textContent = featuredPeli?.duration || '';
                document.querySelector('.btn-play').onclick = () => window.openVideo(featured.videoId, featuredPeli?.creator, featuredPeli?.year, featuredPeli?.coverScale);
                
                // Generar Pel·lícules
                const peliculesContainer = document.getElementById('pelicules-container');
                peliculesContainer.innerHTML = ''; // Clear skeletons
                data.pelicules.forEach(peli => {
                    const card = document.createElement('article');
                    card.className = 'video-card';
                    const yearNum = parseInt(String(peli.year).match(/\d{4}/)?.[0] ?? '0', 10);
                    const era = yearNum < 1990 ? 'vintage'
                              : yearNum < 2010 ? 'classic'
                              : 'modern';
                    card.dataset.era = era;
                    card.onclick = () => window.openVideo(peli.videoId, peli.creator, peli.year, peli.coverScale);
                    const partsCount = Array.isArray(peli.videoId) ? peli.videoId.length : 1;
                    const partsBadge = partsCount > 1 ? `<div class="parts-badge">${partsCount} parts</div>` : '';
                    const imgStyle = buildCoverStyle(peli);
                    card.innerHTML = `
                        <img src="${peli.coverUrl}" alt="Sant Antoni ${peli.year}"${imgStyle}>
                        ${partsBadge}
                        <div class="card-year-top${String(peli.year).includes('-') ? ' card-year-top--range' : ''}">${peli.year}</div>
                        <div class="play-icon"></div>
                        <div class="card-info">
                            <div class="card-creator">${peli.creator}</div>
                            <div class="card-duration">${peli.duration}</div>
                        </div>
                    `;
                    peliculesContainer.appendChild(card);
                });
                
                // Generar Clips (barrejats aleatòriament)
                allClips = [...data.clips].sort(() => Math.random() - 0.5);
                initClipsFilter();
                renderClips();

                // Inicialitzar navegació del carrusel
                initCarouselNav();

                // If the page was opened with `?v=<youtubeId>`, auto-open that video.
                tryOpenFromUrl();

            } catch (error) {
                console.error('Error carregant dades:', error);
                // Clear skeletons on error
                document.getElementById('pelicules-container').innerHTML = '<p style="color: var(--text-secondary); padding: 1rem;">Error carregant vídeos</p>';
                document.getElementById('clips-container').innerHTML = '';
            }
        }

        // Extract numeric year from a clip year value (handles "1982-1983")
        function clipYearNum(year) {
            const m = String(year).match(/\d{4}/);
            return m ? parseInt(m[0], 10) : NaN;
        }

        function getFilteredClips() {
            if (clipsFilter === 'all') return allClips;
            const start = parseInt(clipsFilter, 10);
            return allClips.filter(c => {
                const y = clipYearNum(c.year);
                return y >= start && y < start + 10;
            });
        }

        // Resolve `?peli=<id>` or `?clip=<id>` and open the matching entry.
        // The param name says which list to search, so an id present in both
        // (e.g. -b6B9HO7984) resolves unambiguously to whichever the sharer was watching.
        // Multi-part items open at the part that actually contains the id, not always part 1.
        function tryOpenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const clipId = params.get('clip');
            const peliId = params.get('peli');

            if (clipId) {
                const clipList = getFilteredClips();
                for (let i = 0; i < clipList.length; i++) {
                    const parts = clipParts(clipList[i]);
                    const partIdx = parts.findIndex(p => partId(p) === clipId);
                    if (partIdx >= 0) {
                        window.openClip(clipList, i);
                        if (partIdx > 0) {
                            currentPartIdx = partIdx;
                            updateRecommendationsUI();
                            playCurrentVideo();
                        }
                        return;
                    }
                }
            } else if (peliId) {
                for (const peli of allPelicules) {
                    const parts = Array.isArray(peli.videoId) ? peli.videoId : [peli.videoId];
                    const partIdx = parts.findIndex(id => id === peliId);
                    if (partIdx >= 0) {
                        window.openVideo(peli.videoId, peli.creator, peli.year, peli.coverScale);
                        if (partIdx > 0) {
                            currentPartIdx = partIdx;
                            updatePartUI();
                            playCurrentVideo();
                        }
                        return;
                    }
                }
            } else {
                return;
            }

            // Param present but id not found (stale/removed) — strip it so the page stays clean.
            clearShareUrl();
        }

        function renderClips() {
            const clipsContainer = document.getElementById('clips-container');
            clipsContainer.innerHTML = '';
            const list = getFilteredClips();
            if (list.length === 0) {
                clipsContainer.innerHTML = '<p style="color: var(--text-secondary); padding: 1rem;">No hi ha clips per a aquest filtre.</p>';
                return;
            }
            list.forEach((clip, idx) => {
                const card = document.createElement('article');
                card.className = 'video-card clip-card';
                card.onclick = () => window.openClip(list, idx);
                const imgStyle = buildCoverStyle(clip);
                const partsCount = Array.isArray(clip.videoId) ? clip.videoId.length : 1;
                const partsBadge = partsCount > 1 ? `<div class="parts-badge">${partsCount} parts</div>` : '';
                const thumbId = partId(clipParts(clip)[0]);
                card.innerHTML = `
                    <div class="card-cover">
                        <img src="https://img.youtube.com/vi/${thumbId}/hqdefault.jpg" alt="Clip Sant Antoni ${clip.year}"${imgStyle}>
                        ${partsBadge}
                        <div class="play-icon"></div>
                    </div>
                    <div class="card-info-below">
                        <div class="card-title">${clip.title}</div>
                        <div class="card-year">${clip.year}</div>
                    </div>
                `;
                clipsContainer.appendChild(card);
            });
        }

        function initClipsFilter() {
            const btn = document.getElementById('clips-filter-btn');
            const menu = document.getElementById('clips-filter-menu');
            const wrap = document.getElementById('clips-filter-wrap');
            const label = btn.querySelector('.filter-btn-label');

            // Compute decades present in the data (newest first)
            const decadeCounts = new Map();
            allClips.forEach(c => {
                const y = clipYearNum(c.year);
                if (Number.isNaN(y)) return;
                const d = Math.floor(y / 10) * 10;
                decadeCounts.set(d, (decadeCounts.get(d) || 0) + 1);
            });
            const decades = [...decadeCounts.keys()].sort((a, b) => b - a);

            const options = [
                { value: 'all', label: 'Tots', count: allClips.length },
                ...decades.map(d => ({ value: String(d), label: `${d}s`, count: decadeCounts.get(d) }))
            ];

            function renderMenu() {
                menu.innerHTML = '';
                options.forEach(opt => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'filter-option' + (clipsFilter === opt.value ? ' active' : '');
                    item.setAttribute('role', 'menuitem');
                    item.innerHTML = `<span>${opt.label}</span><span class="count">${opt.count}</span>`;
                    item.addEventListener('click', () => {
                        clipsFilter = opt.value;
                        label.textContent = opt.label;
                        closeMenu();
                        renderClips();
                        renderMenu();
                    });
                    menu.appendChild(item);
                });
            }

            function openMenu() {
                menu.classList.add('open');
                btn.setAttribute('aria-expanded', 'true');
            }
            function closeMenu() {
                menu.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
            }

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (menu.classList.contains('open')) closeMenu();
                else openMenu();
            });
            document.addEventListener('click', (e) => {
                if (!wrap.contains(e.target)) closeMenu();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeMenu();
            });

            renderMenu();
        }

        // Carousel Navigation
        function initCarouselNav() {
            const container = document.getElementById('pelicules-container');
            const leftBtn = document.getElementById('carousel-nav-left');
            const rightBtn = document.getElementById('carousel-nav-right');

            function updateNavButtons() {
                const scrollLeft = container.scrollLeft;
                const maxScroll = container.scrollWidth - container.clientWidth;

                if (scrollLeft <= 0) {
                    leftBtn.classList.remove('visible');
                } else {
                    leftBtn.classList.add('visible');
                }

                if (scrollLeft >= maxScroll - 1) {
                    rightBtn.classList.remove('visible');
                } else {
                    rightBtn.classList.add('visible');
                }
            }

            function scrollCarousel(direction) {
                const scrollAmount = container.clientWidth * 0.8;
                container.scrollBy({
                    left: direction * scrollAmount,
                    behavior: 'smooth'
                });
            }

            leftBtn.addEventListener('click', () => scrollCarousel(-1));
            rightBtn.addEventListener('click', () => scrollCarousel(1));
            container.addEventListener('scroll', updateNavButtons);

            // Actualitzar botons inicialment
            updateNavButtons();
        }

        // Carregar dades (modules are deferred, so DOM is ready)
        loadData();
    </script>
</body>
</html>
